[package]
name = "nexus_web3"
version = "0.1.0"
edition = "2021"
description = "Stage 14: Web3 MEV, Jito Bundles, Cross-Chain Arbitrage"

[dependencies]
# Core
tokio = { version = "1.35", features = ["full"] }
bytes = "1.5"
thiserror = "1.0"

# Cryptography
sha2 = "0.10"
sha3 = "0.10"
secp256k1 = { version = "0.27", features = ["global-context", "rand-std"] }
ed25519-dalek = "2.1"
bs58 = "0.5"

# Serialization (zero-copy where possible)
rlp = "0.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# U256 math
uint = "0.9"
num-bigint = "0.4"
num-traits = "0.2"

# gRPC (Jito)
tonic = "0.10"
prost = "0.12"
tokio-stream = "0.1"

# Solana
solana-sdk = "1.17"
solana-transaction = "1.17"
solana-client = "1.17"

# Logging
tracing = "0.1"

[dev-dependencies]
criterion = "0.5"
rand = "0.8"

[[bin]]
name = "jito_client"
path = "src/bin/jito_client.rs"
