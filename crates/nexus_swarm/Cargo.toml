[package]
name = "nexus_swarm"
version = "0.1.0"
edition = "2021"
description = "NEXUS-OMEGA Distributed Swarm Consensus with Raft, STONITH Fencing, and OMS Replication"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"

# Logging
tracing = "0.1"

# CRC32 for log integrity
crc32fast = "1.3"

# HTTP client for witness communication
reqwest = { version = "0.11", features = ["json", "timeout"] }

# Crossbeam for lock-free data structures
crossbeam-skiplist = "0.1"

# Atomic operations (standard library provides most, but this adds utilities)
crossbeam-utils = "0.8"

[dev-dependencies]
tokio-test = "0.4"

[features]
default = []
test-stub = []  # Enable stub implementations for testing
