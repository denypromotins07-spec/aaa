[package]
name = "nexus_signal"
version = "0.1.0"
edition = "2021"
description = "SIMD-Accelerated Signal Processing, Kalman Filtering & Noise Estimation for NEXUS-OMEGA"

[dependencies]
nexus_core = { path = "../nexus_core" }
nexus_alpha = { path = "../nexus_alpha" }

# SIMD acceleration
wide = "0.7"

# Math & Statistics
nalgebra = "0.32"

# Concurrency
crossbeam = "0.8"
parking_lot = "0.12"

# Logging
tracing = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "signal_benchmarks"
harness = false

[lib]
crate-type = ["cdylib", "rlib"]
