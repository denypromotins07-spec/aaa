[package]
name = "nexus_telemetry"
version = "0.1.0"
edition = "2021"

[dependencies]
# Async runtime with dedicated thread pool support
tokio = { version = "1.35", features = ["full", "rt-multi-thread"] }
# Web framework with WebSocket support
axum = { version = "0.7", features = ["ws"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
hyper = "1.1"
hyper-util = { version = "0.1", features = ["tokio"] }
# Zero-allocation binary serialization (MessagePack)
rmp-serde = "1.1"
serde = { version = "1.0", features = ["derive"] }
# Lock-free SPSC channel
crossbeam = "0.8"
parking_lot = "0.12"
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.6", features = ["v4"] }
futures = "0.3"
bytes = "1.5"
# For demo data generation
rand = "0.8"
# JSON for control messages only
serde_json = "1.0"
