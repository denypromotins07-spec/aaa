[package]
name = "nexus_telemetry"
version = "0.1.0"
edition = "2021"

[dependencies]
# Async runtime - dedicated thread pool isolation
tokio = { version = "1.35", features = ["full", "rt-multi-thread", "sync"] }

# WebSocket server framework
axum = { version = "0.7", features = ["ws"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }

# Zero-allocation binary serialization (CRITICAL: No serde_json in hot path)
bincode = "1.3"
rmp-serde = "1.1"
serde = { version = "1.0", features = ["derive"] }

# Lock-free SPSC ring buffer for zero-copy telemetry
crossbeam = "0.8"
ringbuf = "0.3"
parking_lot = "0.12"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time handling
chrono = "0.4"

# Error handling
thiserror = "1.0"
